task_description: |
  Compute batched global sequence alignment scores using the Needleman-Wunsch dynamic programming
  algorithm with affine gap penalties.

  For each sequence pair `(query, target)`, compute the optimal global alignment score under four
  integer scoring parameters:
  - match reward
  - mismatch penalty
  - gap-open penalty
  - gap-extend penalty

  The affine-gap recurrence maintains three DP states:
    M[i,j] = best score ending with aligning query[i-1] to target[j-1]
    X[i,j] = best score ending with a gap in the target  (vertical move)
    Y[i,j] = best score ending with a gap in the query   (horizontal move)

  The final score for a pair is `max(M[m,n], X[m,n], Y[m,n])`.

interface: |
  ```c
  // compute_only interface: ALL work happens inside solution_compute.
  // The ENTIRE function call is timed, including allocations and host-device copies.

  extern "C" void solution_compute(
      int N,
      int total_query_len,
      int total_target_len,
      int match_score,
      int mismatch_penalty,
      int gap_open_penalty,
      int gap_extend_penalty,
      const int* query_seqs,
      const int* target_seqs,
      const int* query_offsets,
      const int* target_offsets,
      int* scores
  );

  extern "C" void solution_free(void);
  ```

input_size_notes: |
  - `query_seqs` and `target_seqs` are concatenated DNA sequences encoded as int32 in [0, 3]
  - `query_offsets[p] .. query_offsets[p+1]-1` gives pair `p`'s query sequence
  - `target_offsets[p] .. target_offsets[p+1]-1` gives pair `p`'s target sequence
  - Output `scores[p]` is one integer global-alignment score per pair
  - The three sizes differ by batch count and sequence length ranges

output_contract: |
  - `scores[p]` must equal the exact CPU reference result for every pair
  - Output format is one integer per line in `output.txt`
  - `solution_compute` must synchronize before returning
  - All input pointers are HOST pointers. You must copy them to GPU yourself.
  - The whole `solution_compute` call is timed.

algorithm_background: |
  This is a classic affine-gap global alignment DP. Compared with constant-gap alignment,
  affine gaps require three coupled DP states. The dependencies are still local, but the
  per-cell state transition is richer:

    M[i,j] = max(M[i-1,j-1], X[i-1,j-1], Y[i-1,j-1]) + s(query[i-1], target[j-1])
    X[i,j] = max(M[i-1,j] + go + ge, X[i-1,j] + ge)
    Y[i,j] = max(M[i,j-1] + go + ge, Y[i,j-1] + ge)

  Here `go` is gap-open penalty and `ge` is gap-extend penalty.
  The DP has anti-diagonal / wavefront parallel structure within each alignment matrix.

hints_l2: |
  - Use one thread block or one warp-group per sequence pair for coarse-grained batch parallelism
  - Exploit anti-diagonal wavefront updates within each alignment matrix
  - Affine gaps require carrying three state values per cell (`M`, `X`, `Y`)
  - Shorter pairs may be grouped together to reduce warp divergence
  - Shared memory can help for rolling frontiers of the three DP states

hints_l1: |
  ### 1. Batched Coarse-Grained Parallelism
  Map different sequence pairs to different thread blocks or persistent workers.

  ### 2. Wavefront DP
  Cells on the same anti-diagonal can be updated in parallel once the previous anti-diagonal is done.

  ### 3. Three-State Rolling Storage
  Keep only the previous and current frontiers (or rows) of `M`, `X`, and `Y`.

  ### 4. Length Bucketing
  Since sequence lengths vary, bucket similar lengths together to reduce divergence.

  ### 5. Synchronization
  Ensure all GPU work is complete before returning from `solution_compute`.
