task_description: |
  Compute the maximum number of canonical base pairs for each RNA sequence using the classical
  Nussinov dynamic programming recurrence for RNA secondary-structure prediction.

  For each sequence `s[0..n-1]`, the DP considers canonical pairs:
  - A-U, U-A
  - C-G, G-C
  - G-U, U-G

  and a fixed minimum hairpin loop length `L`.

  The recurrence is:
    dp[i,j] = max(
      dp[i+1,j],
      dp[i,j-1],
      dp[i+1,j-1] + pair(s[i], s[j]),
      max_k dp[i,k] + dp[k+1,j]
    )
  for `j - i > L`.

  Output one integer score per sequence: the maximum number of valid base pairs.

interface: |
  ```c
  extern "C" void solution_compute(
      int N,
      int total_seq_len,
      int min_loop_len,
      const int* seqs,
      const int* offsets,
      int* scores
  );

  extern "C" void solution_free(void);
  ```

input_size_notes: |
  - `seqs` stores all RNA sequences concatenated and encoded as int32 in [0, 3]
    where 0=A, 1=C, 2=G, 3=U
  - `offsets[p] .. offsets[p+1]-1` gives sequence `p`
  - `scores[p]` is one integer maximum-base-pair count per sequence
  - Sizes differ by batch count and RNA sequence-length range

output_contract: |
  - `scores[p]` must exactly match the CPU reference output
  - Output format is one integer per line in `output.txt`
  - `solution_compute` must synchronize before returning
  - All pointers passed to `solution_compute` are HOST pointers
  - The entire `solution_compute` call is timed

algorithm_background: |
  This is a classic interval DP / wavefront dynamic program.
  Dependencies are organized by increasing span length. For each cell `(i,j)`,
  there are local transitions (`i+1,j`, `i,j-1`, `i+1,j-1`) plus a split reduction
  over all `k` in `[i+1, j-1]`.

  The algorithm is more difficult than simple single-state sequence DP because each
  chart cell combines wavefront synchronization with a nontrivial max reduction.

hints_l2: |
  - Map different RNA sequences to different thread blocks or persistent workers
  - Process each DP matrix by increasing span length / anti-diagonals
  - The split term `max_k dp[i,k] + dp[k+1,j]` is the main per-cell reduction bottleneck
  - Shared memory can help for short sequences or tiled subproblems
  - Group similar sequence lengths together to reduce divergence

hints_l1: |
  ### 1. Batch-Level Parallelism
  Assign different sequences to independent workers or blocks.

  ### 2. Wavefront Scheduling
  Process increasing span lengths. Cells on the same diagonal can run in parallel.

  ### 3. Split Reduction
  The `max_k` split is often the dominant work per cell. Parallelize or tile it.

  ### 4. Rolling / Tiled Storage
  For small and medium sequences, shared memory or blocked storage may reduce traffic.

  ### 5. Synchronization
  Ensure all GPU work is complete before returning from `solution_compute`.
